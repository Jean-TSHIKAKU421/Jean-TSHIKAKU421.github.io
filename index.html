<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio professionnel - Jean TSHIKAKU | Développeur Logiciel & Web Junior">
    <meta name="author" content="Jean TSHIKAKU">
    <meta name="keywords" content="développeur, web, portfolio, lubumbashi, RDC, nodejs, react, python">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Portfolio | Jean TSHIKAKU">
    <meta property="og:description" content="Développeur Logiciel & Web Junior - Portfolio professionnel">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="fr_FR">
    
    <!-- Sécurité -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; connect-src 'self'">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="no-referrer">
    <meta name="robots" content="index, follow">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👨‍💻</text></svg>">
    
    <title>Portfolio | Jean TSHIKAKU</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    
    <!-- CSS principal -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loader de sécurité -->
    <div id="security-loader" class="security-loader">
        <div class="loader-content">
            <div class="crypto-loader"></div>
            <p>Chargement sécurisé...</p>
        </div>
    </div>

    <!-- Navigation -->
    <nav id="navbar" class="navbar">
        <div class="nav-container">
            <a href="#home" class="nav-logo" data-section="home" aria-label="Retour à l'accueil">
                <span class="logo-bracket">&lt;</span>
                <span class="logo-text">Portfolio</span>
                <span class="logo-bracket">/&gt;</span>
            </a>
            <div class="nav-menu" id="nav-menu" role="navigation" aria-label="Navigation principale"></div>
            <button class="nav-toggle" id="nav-toggle" aria-label="Menu navigation" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Contenu principal -->
    <main id="main-content">
        <!-- Hero / Accueil -->
        <section id="home" class="hero-section">
            <div class="container">
                <div id="home-content"></div>
            </div>
        </section>

        <!-- À propos -->
        <section id="about" class="about-section">
            <div class="container">
                <div id="about-content"></div>
            </div>
        </section>

        <!-- Compétences -->
        <section id="skills" class="skills-section">
            <div class="container">
                <div id="skills-content"></div>
            </div>
        </section>

        <!-- Projets -->
        <section id="projects" class="projects-section">
            <div class="container">
                <div id="projects-content"></div>
            </div>
        </section>

        <!-- Expérience -->
        <section id="experience" class="experience-section">
            <div class="container">
                <div id="experience-content"></div>
            </div>
        </section>

        <!-- Contact -->
        <section id="contact" class="contact-section">
            <div class="container">
                <div id="contact-content"></div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer id="footer" class="footer">
        <div class="container">
            <div id="footer-content"></div>
        </div>
    </footer>

    <!-- Bouton retour en haut -->
    <button id="back-to-top" class="back-to-top" aria-label="Retour en haut" title="Retour en haut">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <!-- Scripts -->
    <script src="js/security.js"></script>
    <script src="js/imageRotator.js"></script>
    <script src="js/projectImageRotator.js"></script>
    <script src="js/dataLoader.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
